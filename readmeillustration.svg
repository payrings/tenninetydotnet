<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      
      /* Static colours universal to all backgrounds and software */
      :root {
        --grey: #767676;
        --blue: #3B82F6;
        --green: #22C55E;
      }
      
      text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        text-anchor: middle;
      }
      
      .label-blue { fill: var(--blue); font-weight: 500; }
      .label-green { fill: var(--green); font-weight: 500; }
      .label-grey { fill: var(--grey); font-weight: 500; }
      .label-small { font-size: 13px; fill: var(--grey); text-anchor: start; }
      
      .stroke-blue { stroke: var(--blue); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-green { stroke: var(--green); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-grey { stroke: var(--grey); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .stroke-dashed { stroke: var(--grey); fill: none; stroke-width: 1.5; stroke-dasharray: 6 6; stroke-linecap: round; stroke-linejoin: round; }
      
      .arrow { fill: none; stroke: var(--grey); stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    
    <!-- Arrowhead Marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 5 5 L 0 9" fill="none" stroke="var(--grey)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <!-- Transparency mask to cleanly separate overlapping icons without solid background colours -->
    <mask id="cut-bubble">
      <rect x="0" y="0" width="1100" height="520" fill="white" />
      <circle cx="780" cy="275" r="18" fill="black" />
    </mask>
  </defs>

  <!-- ==================== LEFT SECTION: FRONTIER ==================== -->
  
  <!-- 10% Frontier Label and Curly Brace -->
  <text x="120" y="135" class="label-blue">10% frontier</text>
  <path d="M 45 160 Q 45 153 52 153 L 113 153 Q 120 153 120 146 Q 120 153 127 153 L 188 153 Q 195 153 195 160" class="stroke-blue" stroke-width="1.5"/>
  
  <!-- Frontier Box -->
  <rect x="35" y="170" width="170" height="180" rx="12" class="stroke-blue"/>
  
  <!-- Cloud Icon -->
  <path d="M 100 255 L 140 255 A 16 16 0 0 0 153 230 A 22 22 0 0 0 135 205 A 24 24 0 0 0 95 212 A 16 16 0 0 0 87 240 A 14 14 0 0 0 100 255 Z" class="stroke-grey"/>
  
  <!-- Hexagonal Network Icon inside Cloud -->
  <g class="stroke-blue" stroke-width="1.5">
    <path d="M 120 218 L 132 225 L 132 239 L 120 246 L 108 239 L 108 225 Z"/>
    <line x1="120" y1="232" x2="120" y2="218"/>
    <line x1="120" y1="232" x2="132" y2="239"/>
    <line x1="120" y1="232" x2="108" y2="239"/>
    <circle cx="120" cy="232" r="2" fill="var(--blue)"/>
    <circle cx="120" cy="218" r="2" fill="var(--blue)"/>
    <circle cx="132" cy="225" r="2" fill="var(--blue)"/>
    <circle cx="132" cy="239" r="2" fill="var(--blue)"/>
    <circle cx="120" cy="246" r="2" fill="var(--blue)"/>
    <circle cx="108" cy="239" r="2" fill="var(--blue)"/>
    <circle cx="108" cy="225" r="2" fill="var(--blue)"/>
  </g>
  
  <!-- Frontier Label -->
  <text x="120" y="310" class="label-blue">frontier reasoning layer</text>

  <!-- Arrow 1: Frontier to Specification -->
  <line x1="210" y1="260" x2="263" y2="260" class="arrow" marker-end="url(#arrow)"/>


  <!-- ==================== DASHED SECURITY BOUNDARY ==================== -->
  
  <!-- Outer Dashed Box with Gap for Top Padlock only -->
  <path d="M 655 90 L 1034 90 Q 1050 90 1050 106 L 1050 424 Q 1050 440 1034 440 L 246 440 Q 230 440 230 424 L 230 106 Q 230 90 246 90 L 625 90" class="stroke-dashed"/>
  
  <!-- Top Center Padlock Icon -->
  <g class="stroke-grey">
    <rect x="631" y="86" width="18" height="14" rx="3" fill="none"/>
    <path d="M 635 86 V 81 A 5 5 0 0 1 645 81 V 86"/>
    <circle cx="640" cy="91" r="1.5" fill="var(--grey)"/>
    <line x1="640" y1="92" x2="640" y2="95"/>
  </g>
  
  <!-- Bottom Security Shield Icon (shifted below dashed line) -->
  <path d="M 380 455 L 390 458 L 390 469 Q 390 478 380 481 Q 370 478 370 469 L 370 458 Z" class="stroke-grey" fill="none"/>
  <text x="405" y="472" class="label-small">guarded • deterministic • read-only spec • audited</text>


  <!-- ==================== SPECIFICATION DOCUMENT ==================== -->
  
  <!-- Document Outline with Folded Corner -->
  <path d="M 282 170 L 395 170 L 420 195 L 420 338 Q 420 350 408 350 L 282 350 Q 270 350 270 338 L 270 182 Q 270 170 282 170 Z" class="stroke-grey"/>
  <path d="M 395 170 V 189 Q 395 195 401 195 H 420" class="stroke-grey"/>
  
  <text x="345" y="200" class="label-grey">specification</text>
  
  <!-- Document List Items -->
  <circle cx="295" cy="235" r="3" class="stroke-grey"/>
  <line x1="310" y1="235" x2="385" y2="235" class="stroke-grey"/>
  <circle cx="295" cy="255" r="3" class="stroke-grey"/>
  <line x1="310" y1="255" x2="395" y2="255" class="stroke-grey"/>
  <circle cx="295" cy="275" r="3" class="stroke-grey"/>
  <line x1="310" y1="275" x2="365" y2="275" class="stroke-grey"/>
  
  <!-- Code Icon Box (Bottom Left) -->
  <rect x="290" y="295" width="45" height="38" rx="6" class="stroke-grey"/>
  <text x="312.5" y="320" class="label-grey" style="font-family: monospace; font-size: 14px; font-weight: 600;">&lt;/&gt;</text>
  
  <!-- Small Padlock (Bottom Right) -->
  <g class="stroke-grey">
    <rect x="388" y="315" width="16" height="12" rx="2"/>
    <path d="M 392 315 V 310 A 4 4 0 0 1 400 310 V 315"/>
  </g>

  <!-- Arrow 2: Specification to Implement -->
  <line x1="428" y1="260" x2="463" y2="260" class="arrow" marker-end="url(#arrow)"/>


  <!-- ==================== GREEN SECTION: LOCAL EXECUTION ==================== -->
  
  <!-- 90% Local Execution Label and Curly Brace -->
  <text x="655" y="135" class="label-green">90% local execution</text>
  <path d="M 475 160 Q 475 153 482 153 L 648 153 Q 655 153 655 146 Q 655 153 662 153 L 828 153 Q 835 153 835 160" class="stroke-green" stroke-width="1.5"/>
  
  <!-- Box 1: Implement -->
  <rect x="470" y="170" width="160" height="180" rx="12" class="stroke-green"/>
  <text x="550" y="205" class="label-green">implement</text>
  
  <!-- Laptop Icon -->
  <g class="stroke-green">
    <rect x="520" y="235" width="60" height="38" rx="3"/>
    <rect x="512" y="275" width="76" height="6" rx="2"/>
    <path d="M 542 248 L 535 254 L 542 260"/>
    <path d="M 548 260 L 552 248"/>
    <path d="M 558 248 L 565 254 L 558 260"/>
  </g>
  <text x="550" y="320" class="label-green">local model</text>

  <!-- Arrow 3: Implement to Review -->
  <line x1="638" y1="260" x2="673" y2="260" class="arrow" marker-end="url(#arrow)"/>

  <!-- Box 2: Review -->
  <rect x="680" y="170" width="160" height="180" rx="12" class="stroke-green"/>
  <text x="760" y="205" class="label-green">review</text>
  
  <!-- Speech Bubble Icon with Transparent Hole Cut for Overlapping Checkmark -->
  <g class="stroke-green">
    <g mask="url(#cut-bubble)">
      <rect x="725" y="235" width="60" height="44" rx="8"/>
      <path d="M 740 279 L 730 293 L 750 279"/>
      <line x1="737" y1="250" x2="765" y2="250"/>
      <line x1="737" y1="262" x2="760" y2="262"/>
    </g>
    <!-- Overlapping Circle -->
    <circle cx="780" cy="275" r="16" fill="none" class="stroke-green"/>
    <path d="M 772 275 L 778 281 L 789 268"/>
  </g>
  <text x="760" y="320" class="label-green">local model</text>

  <!-- Arrow 4: Review to Test Gate -->
  <line x1="848" y1="260" x2="883" y2="260" class="arrow" marker-end="url(#arrow)"/>


  <!-- ==================== TEST GATE SECTION ==================== -->
  
  <rect x="890" y="170" width="140" height="180" rx="12" class="stroke-grey"/>
  <text x="960" y="205" class="label-grey">test gate</text>
  
  <!-- Portcullis / Gate Icon -->
  <g class="stroke-grey">
    <path d="M 938 275 V 242 A 22 22 0 0 1 982 242 V 275"/>
    <line x1="933" y1="260" x2="987" y2="260"/>
    <line x1="948" y1="235" x2="948" y2="275"/>
    <line x1="960" y1="220" x2="960" y2="275"/>
    <line x1="972" y1="235" x2="972" y2="275"/>
  </g>
  
  <!-- Green Checkmark Circle -->
  <g class="stroke-green">
    <circle cx="960" cy="315" r="14"/>
    <path d="M 953 315 L 958 320 L 968 309"/>
  </g>

</svg>
